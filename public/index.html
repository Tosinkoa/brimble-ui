<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brimble UI — Static</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <img class="logo" src="/images/logo.svg" width="40" height="40" alt="" />
      <h1>Static site</h1>
      <p class="lede">HTML, CSS, JavaScript, and images only — no server logic.</p>
    </header>
    <main>
      <section class="card" id="demo">
        <p id="message">Edit files in <code>public/</code> and refresh.</p>
        <button type="button" id="action">Run client script</button>
      </section>
    </main>
    <script src="/js/app.js" defer></script>
  </body>
</html>
